name: Build LightmapOptimizer

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Build
        run: dotnet build LightmapOptimizer.csproj --configuration Release

      - name: Package mod
        run: |
          mkdir -p output/LightmapOptimizer
          cp bin/Release/net9.0/LightmapOptimizer.dll output/LightmapOptimizer/
          cp manifest.json output/LightmapOptimizer/
          cd output && zip -r LightmapOptimizer.zip LightmapOptimizer/

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: LightmapOptimizer
          path: output/LightmapOptimizer.zip

